name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [created]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (transpile ES6)
        run: npm run build

      - name: Lint with web-ext
        run: npx web-ext lint --source-dir .

  release:
    runs-on: ubuntu-latest
    needs: build-and-lint
    if: github.event_name == 'release'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Package with web-ext
        run: npx web-ext build --source-dir . --artifacts-dir ./dist

      - name: Upload release artifact
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./dist/daily_motivation_-motivational_quotes-${{ github.event.release.tag_name }}.zip
          asset_name: daily-motivation-firefox-${{ github.event.release.tag_name }}.zip
          asset_content_type: application/zip
